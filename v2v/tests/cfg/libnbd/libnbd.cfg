- libnbd:
    type = "libnbd"
    # Only keep one case for libnbd
    only source_none..dest_none
    vms = ''

    variants:
        - get_size:
            image_size = 1048576
            checkpoint = 'get_size'
        - is_zero:
            checkpoint = 'is_zero'
        - nbdcopy:
          version_required = "[nbdkit-server-1.46.1-3,);[libnbd-1.24.1-1,)"
          variants:
            - destination_is_zero:
              checkpoint = 'check_option_destination_is_zero'
            - allocated:
              checkpoint = 'check_option_allocated'
        - unsanitized_hostname:
            version_required = "[nbdkit-server-1.45.12-2,);[libnbd-1.23.12-1,)"
            checkpoint = 'check_unsanitized_hostname'
            expected_err_msg = "hostname contains invalid characters"
