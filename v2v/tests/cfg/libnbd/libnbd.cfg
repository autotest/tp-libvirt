- libnbd:
    type = "libnbd"
    # Only keep one case for libnbd
    only source_none..dest_none
    vms = ''

    variants:
        - get_size:
            image_size = 1048576
            checkpoint = 'get_size'
        - is_zero:
            checkpoint = 'is_zero'
        - unsanitized_hostname:
            version_required = "[nbdkit-server-1.45.12-2,);[libnbd-1.23.12-1,)"
            checkpoint = 'check_unsanitized_hostname'
            expected_err_msg = "hostname contains invalid characters"
