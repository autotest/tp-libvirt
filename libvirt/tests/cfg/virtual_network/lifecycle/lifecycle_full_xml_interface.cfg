- virtual_network.lifecycle.lifecycle_full_xml_interface:
    type = lifecycle_full_xml_interface
    start_vm = no
    take_regular_screendumps = no
    vm_attrs = {"vcpu": 8}
    login_timeout = 240
    ping_target = "www.google.com"
    mtu = 3000
    variants:
        - network:
            iface_type = "network"
            driver_queues = 4
            basic_config = {'type_name': 'network', 'source': {'network': 'default'}, 'target': {'dev': 'test1'}, 'model': 'virtio'}
            driver_config = {'tune': {'sndbuf': 1600}, 'driver':{"driver_attr":{'name': 'vhost', 'txmode': 'iothread', 'ioeventfd': 'on', 'event_idx': 'off', 'queues': '${driver_queues}', 'rss': 'on', 'rss_hash_report': 'on', 'packed': 'on', 'rx_queue_size': '256', 'tx_queue_size': '256', 'iommu': 'on', 'ats': 'on'},'driver_host': {'csum': 'off', 'gso': 'off', 'tso4': 'off', 'tso6': 'off', 'ecn': 'off', 'ufo': 'off', 'mrg_rxbuf': 'off'}, 'driver_guest': {'csum': 'off', 'tso4': 'off', 'tso6': 'off', 'ecn': 'off', 'ufo': 'off'}}
            network_features = {'port': {'isolated': 'yes'}, "link_state": "up", 'mtu': {'size': '${mtu}'}, 'coalesce': {'max': '7'}, 'acpi': {'index': '1'}}
            bandwidth_alias = {'bandwidth': {'inbound': {'average': '100', 'peak': '500', 'floor': '200', 'burst': '512'}, 'outbound': {'average': '128', 'peak': '256', 'burst': '256'}}, 'alias': {'name': 'ua-821c72de-b42d-4318-ae6c-88f27bca6708'}}}
            iface_dict = {**${basic_config}, **${driver_config}, **${network_features}, **${bandwidth_alias}}
            basic_xpath = "//interface[@type='network'],//interface/source[@network='default'],//interface/target[@dev='test1'],//interface/model[@type='virtio']"
            driver_xpath = "//interface/tune[@sndbuf='1600'],//interface/driver[@name='vhost' and @txmode='iothread' and @ioeventfd='on' and @event_idx='off' and @queues='4' and @rss='on' and @rss_hash_report='on' and @packed='on' and @rx_queue_size='256' and @tx_queue_size='256' and @iommu='on' and @ats='on'],//interface/driver/host[@csum='off' and @gso='off' and @tso4='off' and @tso6='off' and @ecn='off' and @ufo='off' and @mrg_rxbuf='off'],//interface/driver/guest[@csum='off' and @tso4='off' and @tso6='off' and @ecn='off' and @ufo='off']"
            features_xpath = "//interface/filterref[@filter='clean-traffic'],//interface/port[@isolated='yes'],//interface/link[@state='up'],//interface/mtu[@size='${mtu}'],//interface/coalesce/rx/frames[@max='7'],//interface/boot[@order='2'],//interface/acpi[@index='1']"
            bandwidth_xpath = "//interface/bandwidth/inbound[@average='100' and @peak='500' and @floor='200' and @burst='512'],//interface/bandwidth/outbound[@average='128' and @peak='256' and @burst='256'],//interface/alias[@name='ua-821c72de-b42d-4318-ae6c-88f27bca6708']"
            xpath_checks = "${basic_xpath},${driver_xpath},${features_xpath},${bandwidth_xpath}"
        - bridge:
            iface_type = "bridge"
            bridge_name = "br0"
            basic_config = {'type': 'bridge', 'source': {'bridge': 'br0'}, 'model': 'virtio'}
            filter_port = {'filterref': {'filter': 'clean-traffic'}, 'port': {'isolated': 'yes'}}
            network_attrs = {'link': {'state': 'up'}, 'mtu': {'size': '${mtu}'}, 'acpi': {'index': '1'}, 'coalesce': {'rx': {'frames': {'max': '7'}}}}
            bandwidth_config = {'bandwidth': {'inbound': {'average': '100', 'peak': '500', 'floor': '200', 'burst': '512'}, 'outbound': {'average': '128', 'peak': '256', 'burst': '256'}}}
            basic_xpath = "//interface[@type='bridge'],//interface/source[@bridge='br0'],//interface/model[@type='virtio']"
            filter_xpath = "//interface/filterref[@filter='clean-traffic'],//interface/port[@isolated='yes']"
            attrs_xpath = "//interface/link[@state='up'],//interface/mtu[@size='${mtu}'],//interface/acpi[@index='1'],//interface/coalesce/rx/frames[@max='7']"
            bandwidth_xpath = "//interface/bandwidth/inbound[@average='100' and @peak='500' and @floor='200' and @burst='512'],//interface/bandwidth/outbound[@average='128' and @peak='256' and @burst='256']"
            iface_dict = {**${basic_config}, **${filter_port}, **${network_attrs}, **${bandwidth_config}}
            xpath_checks = "${basic_xpath},${filter_xpath},${attrs_xpath},${bandwidth_xpath}"
        - ethernet:
            iface_type = "ethernet"
            bridge_name = "virbr0"
            iface_dict = {'type': 'ethernet', 'target': {'dev': 'mytap0', 'managed': 'no'}, 'mtu': {'size': '${mtu}'}, 'model': {'type': 'virtio'}}
            xpath_checks = "//interface[@type='ethernet'],//interface/target[@dev='mytap0' and @managed='no'],//interface/mtu[@size='${mtu}'],//interface/model[@type='virtio']"
            tap_name = "mytap0"
        - direct_bridge:
            iface_type = "direct"
            iface_dict = {'type': 'direct', 'source': {'dev': 'eth0', 'mode': 'bridge'}, 'model':'virtio'}
            xpath_checks = "//interface[@type='direct'],//interface/source[@dev='eth0' and @mode='bridge'],//interface/model[@type='virtio']"
