- virtual_network.iface_nss:
    type = iface_nss
    only Linux
    create_vm_libvirt = yes
    kill_vm_libvirt = yes
    ovmf:
        kill_vm_libvirt_options = --nvram
    start_vm = "yes"
    net_name = "default"
    variants:
        - nss_libvirt:
            nss_option = "libvirt"
            guest_name = "nssguest"
        - nss_libvirt_guest:
            nss_option = "libvirt_guest"
