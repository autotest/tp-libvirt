- virtual_network.update_device.coalesce:
    type = update_device_coalesce
    only Linux
    create_vm_libvirt = yes
    use_no_reboot = yes
    kill_vm_libvirt = yes
    ovmf:
        kill_vm_libvirt_options = --nvram
    host_iface =
    start_vm = no
    timeout = 240
    outside_ip = 'www.redhat.com'
    vm_ping_outside = pass
    variants:
        - delete_iface_coalesce:
            rx_frames = 32
            coalesce = {'coalesce': {'max': '${rx_frames}'}}
        - add_iface_coalesce:
            coalesce = {}
            updated_rx_frames = 64
            updated_coalesce = {'coalesce': {'max': '${updated_rx_frames}'}}
        - update_iface_coalesce:
            rx_frames = 64
            coalesce = {'coalesce': {'max': '${rx_frames}'}}
            updated_rx_frames = 32
            updated_coalesce = {'coalesce': {'max': '${updated_rx_frames}'}}
    variants:
        - nat_net:
            iface_type = network
            iface_source = {'source': {'network': 'default'}}
        - linux_br:
            iface_type = bridge
            br_type = linux_br
            iface_source = {'source': {'bridge': br_name}}
        - ovs_br:
            iface_type = bridge
            br_type = ovs_br
            iface_source = {'source': {'bridge': br_name}}
    iface_attrs = {'type_name': '${iface_type}', **${coalesce}, **${iface_source}, 'model': 'virtio', 'mac_address': mac}}
