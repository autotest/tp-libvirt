- virtual_network.migrate.udp_transfer_during_migration:
    type = udp_transfer_during_migration
    take_regular_screendumps = "no"
    start_vm = "yes"
    status_error = "no"
    
    # Remote host configuration (required)
    remote_host = 
    remote_user = "root"
    remote_passwd = 
    
    # Guest OS configuration
    guest_os_type = "linux"
    
    # Network configuration
    udp_packet_size = 1473
    netperf_timeout = 120
    
    # Test variants
    variants:
        - linux_guest:
            guest_os_type = "linux"
            only Linux
        - windows_guest:
            guest_os_type = "windows"
            only Windows
            
    variants:
        - with_migration:
            # Migration specific parameters would go here
            # For basic UDP transfer test, migration is optional
            do_migration = "yes"
        - without_migration:
            # Test UDP transfer without migration for baseline
            do_migration = "no"
