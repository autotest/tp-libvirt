- virtual_network.qemu_test.ethtool:
    type = ethtool
    virt_test_type = libvirt
    only Linux
    start_vm = no
    take_regular_screendumps = 'no'
    filesize = 512
    login_timeout = 360
    mtu = "1514"
    queues = 4
    iface_mac = "9a:9b:b9:f5:51:b0"

    variants:
        - virtio:
            model = 'virtio'
            supported_features = "tx sg tso gso"
        - e1000e:
            model = 'e1000e'
            supported_features = "tx rx sg tso gso gro"
    variants br_scenario:
        - linux_bridge:
            iface_type = "bridge"
            bridge_name = "linux_br0"
            iface_attrs = {'type_name': '${iface_type}', 'model': '${model}',"mac_address":"${iface_mac}", 'source': {'bridge': '${bridge_name}'}, "mtu": {"size": "${mtu}"}, 'driver': {'driver_attr': {'queues': '${queues}'}}}
        - ovs_bridge:
            iface_type = "network"
            net_name = "ovs_net"
            bridge_name = "ovs_br0"
            net_attrs = {'name': '${net_name}', 'forward': {'mode': 'bridge'}, 'virtualport_type': 'openvswitch', 'bridge': {'name': '${bridge_name}'}}
            iface_attrs = {'type_name': '${iface_type}', 'model': '${model}',"mac_address": "${iface_mac}", 'virtualport': {'type': 'openvswitch'}, "mtu": {"size": "${mtu}"},'source': {'network': '${net_name}'}}
