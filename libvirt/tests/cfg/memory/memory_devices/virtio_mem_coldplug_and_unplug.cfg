- memory.devices.virtio_mem.coldplug_and_unplug:
    type = virtio_mem_coldplug_and_unplug
    no s390-virtio
    start_vm = "no"
    mem_model = "virtio-mem"
    mem_value = 2097152
    current_mem = 2097152
    numa_mem = 1048576
    max_mem = 4194304
    max_mem_slots = 16
    max_dict = '"max_mem_rt": ${max_mem}, "max_mem_rt_slots": ${max_mem_slots}, "max_mem_rt_unit": "KiB"'
    numa_dict = "'vcpu': 4,'cpu':{'numa_cell': [{'id': '0', 'cpus': '0-1', 'memory': '${numa_mem}'}, {'id': '1', 'cpus': '2-3', 'memory': '${numa_mem}'}]}"
    vm_attrs = {${numa_dict},${max_dict},'memory_unit':'KiB','memory':${mem_value},'current_mem':${current_mem},'current_mem_unit':'KiB'}
    numa_xpath = [{'element_attrs':[".//cell[@unit='KiB']",".//cell[@id='0']",".//cell[@memory='${numa_mem}']"]}]
    target_size = 131072
    block_size = 2048
    request_size = 131072
    base = '0x100000000'
    plug_option = " --config"
    required_kernel = [5.14.0,)
    guest_required_kernel = [5.8.0,)
    func_supported_since_libvirt_ver = (8, 0, 0)
    func_supported_since_qemu_kvm_ver = (6, 2, 0)
    aarch64:
        target_size = 1048576
        block_size = 524288
        request_size = 1048576
    variants case:
        - with_addr:
            addr_dict = "'address':{'attrs': {'base': '${base}'}}"
            virtio_dict = {'mem_model':'${mem_model}','target': {${addr_dict},'size':${target_size}, 'size_unit':'KiB', 'node':0,'requested_size': ${request_size}, 'block_size': ${block_size}}}
            unplug_dict = ${virtio_dict}
            plug_target_size = 524288
            plug_block_size = 2048
            plug_request_size = 524288
            aarch64:
                plug_target_size = 1572864
                plug_block_size = 524288
                plug_request_size = 1572864
            plug_dict = {'mem_model':'${mem_model}', 'target': {${addr_dict},'size':${plug_target_size}, 'size_unit':'KiB','node':0,'requested_size': ${plug_request_size}, 'block_size': ${plug_block_size}}}
            virtio_xpath = [{'element_attrs':["./devices/memory/target/size[@unit='KiB']"],'text':'${target_size}'},{'element_attrs':[".//memory/target/block[@unit='KiB']"],'text':'${block_size}'}, {'element_attrs':[".//memory/target/requested[@unit='KiB']"],'text':'${request_size}'},{'element_attrs':[".//memory/target/address[@base='${base}']"]}]
            unplug_xpath = ${virtio_xpath}
            plug_xpath = [{'element_attrs':[".//memory/target/size[@unit='KiB']"],'text':'${plug_target_size}'},{'element_attrs':[".//memory/target/block[@unit='KiB']"],'text':'${plug_block_size}'}, {'element_attrs':[".//memory/target/requested[@unit='KiB']"],'text':'${plug_request_size}'},{'element_attrs':[".//memory/target/address[@base='${base}']"]}]
        - source_and_mib:
            target_size = 256
            block_size = 2
            request_size = 256
            aarch64:
                target_size = 1024
                block_size = 512
                request_size = 1024
            size_unit = 'MiB'
            requested_unit = 'MiB'
            block_unit = 'MiB'
            source_dict = "'source': {'nodemask': '0','pagesize': 4, 'pagesize_unit':'KiB'}"
            virtio_dict = {'mem_model':'${mem_model}',${source_dict}, 'target': {'size':${target_size}, 'size_unit':'${size_unit}','requested_unit':'${requested_unit}','block_unit':'${block_unit}','node':1,'requested_size': ${request_size}, 'block_size': ${block_size}}}
            unplug_dict = ${virtio_dict}
            plug_target_size = 512
            plug_block_size = 2
            plug_request_size = 512
            virtio_xpath = [{'element_attrs':[".//memory/target/size[@unit='KiB']"],'text':'262144'},{'element_attrs':[".//memory/target/block[@unit='KiB']"],'text':'2048'}, {'element_attrs':[".//memory/target/requested[@unit='KiB']"],'text':'262144'}]
            unplug_xpath = ${virtio_xpath}
            plug_xpath = [{'element_attrs':[".//memory/target/size[@unit='KiB']"],'text':'524288'},{'element_attrs':[".//memory/target/block[@unit='KiB']"],'text':'2048'}, {'element_attrs':[".//memory/target/requested[@unit='KiB']"],'text':'524288'}]
            aarch64:
                plug_target_size = 2048
                plug_block_size = 512
                plug_request_size = 2048
                virtio_xpath = [{'element_attrs':[".//memory/target/size[@unit='KiB']"],'text':'1048576'},{'element_attrs':[".//memory/target/block[@unit='KiB']"],'text':'524288'}, {'element_attrs':[".//memory/target/requested[@unit='KiB']"],'text':'1048576'}]
                unplug_xpath = ${virtio_xpath}
                plug_xpath = [{'element_attrs':[".//memory/target/size[@unit='KiB']"],'text':'2097152'},{'element_attrs':[".//memory/target/block[@unit='KiB']"],'text':'524288'}, {'element_attrs':[".//memory/target/requested[@unit='KiB']"],'text':'2097152'}]
            plug_dict = {'mem_model':'${mem_model}', ${source_dict}, 'target': {'size':${plug_target_size}, 'size_unit':'KiB','node':1,'requested_size': ${plug_request_size}, 'block_size': ${plug_block_size}, 'size_unit':'${size_unit}','requested_unit':'${requested_unit}','block_unit':'${block_unit}'}}
        - unplug_none_dev:
            addr_dict = "'address':{'attrs': {'base': '${base}'}}"
            virtio_dict = {'mem_model':'${mem_model}', 'target': {'size':${target_size}, 'size_unit':'KiB', ${addr_dict}, 'node':0,'requested_size': ${request_size}, 'block_size': ${block_size}}}
            unplug_request_size = 0
            unplug_dict = {'mem_model':'${mem_model}', 'target': {'requested_size': ${unplug_request_size}, 'size':${target_size}, 'size_unit':'KiB', ${addr_dict}, 'node':0,'block_size': ${block_size}}}
            unplug_error = "matching memory device was not found"
            virtio_xpath = [{'element_attrs':[".//memory/target/size[@unit='KiB']"],'text':'${target_size}'},{'element_attrs':[".//memory/target/block[@unit='KiB']"],'text':'${block_size}'}, {'element_attrs':[".//memory/target/requested[@unit='KiB']"],'text':'${request_size}'},{'element_attrs':[".//memory/target/address[@base='${base}']"]}]
            unplug_xpath = [{'element_attrs':[".//memory/target/size[@unit='KiB']"],'text':'${target_size}'},{'element_attrs':[".//memory/target/block[@unit='KiB']"],'text':'${block_size}'}, {'element_attrs':[".//memory/target/requested[@unit='KiB']"],'text':'${unplug_request_size}'},{'element_attrs':[".//memory/target/address[@base='${base}']"]}]
        - plug_exceeded_max_mem:
            target_size = 393216
            block_size = 2048
            request_size = 393216
            plug_target_size = 512
            plug_block_size = 2
            plug_request_size = 512
            aarch64:
                target_size = 1572864
                block_size = 524288
                request_size = 1572864
                plug_target_size = 2048
                plug_block_size = 512
                plug_request_size = 2048
            virtio_dict = {'mem_model':'${mem_model}', 'target': {'size':${target_size}, 'size_unit':'KiB','node':1,'requested_size': ${request_size}, 'block_size': ${block_size}}}
            plug_size_unit = 'MiB'
            plug_requested_unit = 'MiB'
            plug_block_unit = 'MiB'
            plug_dict = {'mem_model':'${mem_model}','target': {'size':${plug_target_size},'node':1,'requested_size': ${plug_request_size}, 'block_size': ${plug_block_size},'size_unit':'${plug_size_unit}','requested_unit':'${plug_requested_unit}','block_unit':'${plug_block_unit}'}}
            plug_error = "Attaching memory device with size '\S+' would exceed domain's maxMemory config size '${max_mem}'"
            virtio_xpath = [{'element_attrs':[".//memory/target/size[@unit='KiB']"],'text':'${target_size}'},{'element_attrs':[".//memory/target/block[@unit='KiB']"],'text':'${block_size}'}, {'element_attrs':[".//memory/target/requested[@unit='KiB']"],'text':'${request_size}'}]
            plug_xpath = [{'element_attrs':[".//memory/target/size[@unit='KiB']"],'text':'${plug_target_size}'},{'element_attrs':[".//memory/target/block[@unit='KiB']"],'text':'${plug_block_size}'}, {'element_attrs':[".//memory/target/requested[@unit='KiB']"],'text':'${plug_request_size}'}]
        - duplicate_addr:
            addr_dict = "'address':{'attrs': {'base': '0x100000000'}}"
            virtio_dict = {'mem_model':'${mem_model}', 'target': {${addr_dict},'size':${target_size}, 'size_unit':'KiB', ${addr_dict}, 'node':0,'requested_size': ${request_size}, 'block_size': ${block_size}}}
            plug_dict = ${virtio_dict}
            plug_error = "unsupported configuration: memory device address [0x100000000:0x108000000] overlaps with other memory device (0x100000000)"
            virtio_xpath = [{'element_attrs':[".//memory/target/size[@unit='KiB']"],'text':'${target_size}'},{'element_attrs':[".//memory/target/block[@unit='KiB']"],'text':'${block_size}'}, {'element_attrs':[".//memory/target/requested[@unit='KiB']"],'text':'${request_size}'},{'element_attrs':[".//memory/target/address[@base='${base}']"]}]
            plug_xpath = ${virtio_xpath}