- memory.devices.virtio_mem.change_memory:
    type = change_requested_mem_of_virtio_mem
    start_vm = no
    mem_model = "virtio-mem"
    nr_hugepages = 2048
    target_size = 262144
    requested_unit = "KiB"
    default_device = "--node 0"
    basic_request_size = 0
    basic_device_alias = "--alias virtiomem0"
    basic_bigger = "262144"
    basic_bigger_size = "${basic_bigger}KiB"
    attach_request_size = 131072
    attach_smaller = "65536"
    attached_device =  "--node 1"
    attach_smaller_size = "${attach_smaller}KiB"
    attached_event = "memory-device-size-change"
    set_size = "128MiB"
    bigger_size = "512MiB"
    zero_size = 0
    virsh_opts = "%s --requested-size %s "
    bigger_size_error = "error: requested size must be smaller than or equal to @size"
    required_kernel = [5.14.0,)
    guest_required_kernel = [5.8.0,)
    func_supported_since_libvirt_ver = (8, 0, 0)
    func_supported_since_qemu_kvm_ver = (6, 2, 0)
    block_size = 2048
    aarch64:
        block_size = 524288
        target_size = 1048576
        basic_request_size = 524288
        set_size = "512MiB"
        bigger_size = "2048MiB"
        basic_bigger = "1048576"
        basic_bigger_size = "${basic_bigger}KiB"
        attach_request_size = 1048576
        attach_smaller = "524288"
        attach_smaller_size = "${attach_smaller}KiB"
    mem_basic = {'mem_model': '${mem_model}', 'target': {'requested_unit': '${requested_unit}', 'size': ${target_size}, 'node': 0, 'size_unit': 'KiB', 'requested_size': ${basic_request_size}, 'block_unit': 'KiB', 'block_size': ${block_size}}}
    mem_attach = {'mem_model': '${mem_model}', 'target': {'requested_unit': '${requested_unit}', 'size': ${target_size}, 'node': 1, 'size_unit': 'KiB', 'requested_size': ${attach_request_size}, 'block_unit': 'KiB', 'block_size': ${block_size}}}
    variants memory_backing:
        - file:
            source_type = 'file'
            source_attr = "'source_type':'${source_type}'"
        - hugepages:
            hugepages_attr = "'hugepages': {}"
        - memfd:
            source_type = 'memfd'
            source_attr = "'source_type':'${source_type}'"
        - undefined:
    variants:
        - with_numa:
            no s390-virtio
            mem_value = 2097152
            memory_unit = 'KiB'
            current_mem = 2097152
            max_mem = 10485760
            max_mem_slots = 16
            numa_mem = 1048576
            base_attrs = "'memory_unit':'${memory_unit}','memory':${mem_value},'current_mem':${current_mem},'current_mem_unit':'KiB'"
            numa_attrs = "'vcpu': 4, 'cpu': {'numa_cell': [{'id': '0', 'cpus': '0-1', 'memory': '${numa_mem}', 'unit': 'KiB'},{'id':'1','cpus': '2-3','memory':'${numa_mem}','unit':'KiB'}]}"
            max_attrs = "'max_mem_rt': ${max_mem}, 'max_mem_rt_slots': ${max_mem_slots}, 'max_mem_rt_unit': 'KiB'"
            vm_attrs = {${base_attrs}, ${numa_attrs}, ${max_attrs}}
            expect_xpath = [{'element_attrs':[".//memory[@unit='${memory_unit}']"],'text':'%d'},{'element_attrs':[".//currentMemory[@unit='KiB']"],'text':'%d'}]
