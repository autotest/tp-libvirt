- memory.balloon.various:
    type = various_mem_balloons
    start_vm = no
    mem_unit = "KiB"
    current_mem_unit = "KiB"
    current_mem = "2097152"
    mem_value = "2097152"
    lower_mem_value = "1843200"
    higher_mem_value = "3145728"
    higher_error_msg = "error: invalid argument: cannot set memory higher than max memory"
    not_running_msg = "error: Requested operation is not valid: domain is not running"
    memballoon_alias_name = "ua-c80aba6e-b6d8-448b-ab6e-8c7b5c29f353"
    sized_event_type = "yes"
    variants:
        - virtio:
            memballoon_model = "virtio"
            memballoon_driver = "virtio-balloon-pci"
        - virtio-non-transitional:
            memballoon_model = "virtio-non-transitional"
            memballoon_driver = "virtio-balloon-pci-non-transitional"
        - none:
            memballoon_model = "none"
            memballoon_driver = ""
            sized_event_type = "no"
            lower_error_status = 1
            lower_error_msg = "error: Requested operation is not valid: Unable to change memory of active domain without the balloon device and guest OS balloon driver"

