- gpu.single_passthrough_numa_pci_topo:
    type = single_passthrough_numa_pci_topo
    start_vm = "no"
    mem_value = 32
    vcpu = 32 
  
    only aarch64      
    variants:
        - numa_continous:
            numa_attrs = "'cpu': {'numa_cell':[{'id':'0','cpus':'0-31','memory':'32','unit':'GiB'},{'id':'1','memory':'0'},{'id':'2','memory':'0'},{'id':'3','memory':'0'},{'id':'4','memory':'0'},{'id':'5','memory':'0'},{'id':'6','memory':'0'},{'id':'7','memory':'0'},{'id':'8','memory':'0'}]}"
            acpi_nodeset = {'nodeset':'1-8'}
        - numa_non_continous:
            numa_attrs = "'cpu': {'numa_cell':[{'id':'0','cpus':'0-31','memory':'32','unit':'GiB'},{'id':'1','memory':'0'},{'id':'2','memory':'0'},{'id':'3','memory':'0'},{'id':'4','memory':'0'},{'id':'5','memory':'0'},{'id':'6','memory':'0'},{'id':'7','memory':'0'},{'id':'8','memory':'0'},{'id':'9','memory':'0'},{'id':'10','memory':'0'},{'id':'11','memory':'0'}]}"
            acpi_nodeset = {'nodeset':'1,3,5,7-11'}
        - numa_mem_only:
            numa_attrs = "'cpu': {'numa_cell':[{'id':'0','cpus':'0-31','memory':'28','unit':'GiB'},{'id':'1','memory':'0'},{'id':'2','memory':'0'},{'id':'3','memory':'0'},{'id':'4','memory':'0'},{'id':'5','memory':'0'},{'id':'6','memory':'0'},{'id':'7','memory':'0'},{'id':'8','memory':'0'},{'id':'9','memory':'4','unit':'GiB'}]}"
            acpi_nodeset = {'nodeset':'1-8'}
    variants:
        - pxb_pcie:
            pxb_addr = "'address':{'attrs':{'type':'pci','domain':'0x0000','bus':0x00,'slot':'%s','function':'0x0'}}"
            pxb_ctrl_attrs = {'type':'pci','model': 'pcie-expander-bus','index': '%s',${pxb_addr}}
            pcie_root_port_addr = "'address':{'attrs':{'type':'pci','domain':'0x0000','bus':'%s','slot':'0x00','function':'0x0'}}"
            pcie_root_port_attrs = {'type':'pci','model':'pcie-root-port','index':'%s',${pcie_root_port_addr}}
        - pxb_downstream:
    vm_attrs = {'memory_unit':'GiB','memory':${mem_value},'vcpu':${vcpu},${numa_attrs}}
    gpu_driver = "'driver':{'driver_attr':{'iommufd':'yes'}}"
    gpu_addr = "'address':{'attrs':{'type':'pci','domain':'0x0000','bus':'%s','slot':'0x00','function':'0x0'}}"
    gpu_hostdev_dict = {${gpu_driver},'acpi':${acpi_nodeset},'mode':'subsystem','type':'pci','source':{'untyped_address':gpu_pci_addr},'managed':'yes',${gpu_addr}}
    iommu_dict = {'model':'smmuv3','driver':{'pciBus':'%s','accel':'on','cmdqv':'off','ats':'on','ril':'off','ssidSize':'20','oas':'48'}}
