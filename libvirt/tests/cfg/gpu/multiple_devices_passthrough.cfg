- gpu.multiple_devices_passthrough:
    type = multiple_devices_passthrough
    start_vm = "no"
    mem_value = 32
    vcpu = 32 
    numa_attrs = "'cpu': {'numa_cell':[{'id':'0','cpus':'0-31','memory':'32','unit':'GiB'},{'id':'1','memory':'0'},{'id':'2','memory':'0'},{'id':'3','memory':'0'},{'id':'4','memory':'0'},{'id':'5','memory':'0'},{'id':'6','memory':'0'},{'id':'7','memory':'0'},{'id':'8','memory':'0'}}]}"
    acpi_nodeset = {'nodeset':'1-8'}
  
    only aarch64      
    variants:
        - both_cmdqv_on:
            cmdqv_dict = {'cmdqv':'on'}
            cmdqv_dict_2 = {'cmdqv':'on'}
        - both_cmdqv_off:
            cmdqv_dict = {'cmdqv':'off'}
            cmdqv_dict_2 = {'cmdqv':'off'}        
        - gpu_cmdqv_off_nic_cmdqv_on:
            cmdqv_dict = {'cmdqv':'off'}
            cmdqv_dict_2 = {'cmdqv':'on'}
        - gpu_cmdqv_on_nic_cmdqv_off:
            cmdqv_dict = {'cmdqv':'on'}
            cmdqv_dict_2 = {'cmdqv':'off'}
    variants:
        - only_gpu_smmuv3:
            iommu_dict = {'model':'smmuv3','driver':{'pciBus':'%s','accel':'on','ats':'on','ril':'off','ssidSize':'20','oas':'48'}}            
        - both_smmuv3:
            # For GPU as default
            iommu_dict = {'model':'smmuv3','driver':{'pciBus':'%s','accel':'on','ats':'on','ril':'off','ssidSize':'20','oas':'48'}}
            # For another VFIO device
            iommu_dict_2 = {'model':'smmuv3','driver':{'pciBus':'%s','accel':'on','ats':'on','ril':'off','ssidSize':'20','oas':'48'}}
            variants:
                - nic_smmuv3_first:
                    smmuv3_desc_defined = yes
                - gpu_smmuv3_first:
                    smmuv3_desc_defined = no
    variants:
        - pxb_pcie:
            pxb_ctrl_attrs = {'model': 'pcie-expander-bus','index': '%s','modelname':'pxb-pcie','bus':'0x00','slot':'%s'}
            pcie_root_port_attrs = {'model':'pcie-root-port','index':'%s','bus':'%s','slot':'0x00'}
            pxb_ctrl_attrs_2 = {'model': 'pcie-expander-bus','index': '%s','modelname':'pxb-pcie','bus':'0x00','slot':'%s'}
            pcie_root_port_attrs_2 = {'model':'pcie-root-port','index':'%s','bus':'%s','slot':'0x00'}
        - pxb_downstream:
    variants nic_type:
        - nic_interface:
            variants dev_source:
                - vf:
                    iface_dict = {'managed': 'yes', 'type_name': 'hostdev', 'hostdev_address': {'type_name': 'pci', 'attrs': vf_pci_addr}, 'driver': {'driver_attr': {'name': 'vfio'}}, 'alias': {'name': 'ua-89cbe690-6c6c-4f2f-adac-5826fe52ea74'}, 'mac_address': mac_addr}
                    check_ping_time = "yes"
        - nic_hostdev:
            variants dev_source:
                - vf:
                    hostdev_dict = {'driver':{'driver_attr':{'iommufd':'yes'}},'alias': {'name': 'ua-1bcbabff-f022-4d4f-ae8c-13f2d3a07906'}, 'mode': 'subsystem', 'type': 'pci', 'source': {'untyped_address': vf_pci_addr}, 'managed': 'yes'}
                - pf:
                    hostdev_dict = {'driver':{'driver_attr':{'iommufd':'yes'}},'mode': 'subsystem', 'type': 'pci', 'source': {'untyped_address': pf_pci_addr}, 'managed': 'yes'}
    vm_attrs = {'memory_unit':'GiB','memory':${mem_value},'vcpu':${vcpu},${numa_attrs}}
    gpu_hostdev_dict = {'driver':{'driver_attr':{'iommufd':'yes'}},'acpi':${acpi_nodeset},'mode':'subsystem','type':'pci','source':{'untyped_address':gpu_pci_addr},'managed':'yes'}

    