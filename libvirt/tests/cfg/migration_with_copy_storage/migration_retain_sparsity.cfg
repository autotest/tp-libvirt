- migration_with_copy_storage.migration_retain_sparsity:
    type = migration_retain_sparsity
    migration_setup = 'yes'
    # Console output can only be monitored via virsh console output
    only_pty = True
    take_regular_screendumps = no
    # Extra options to pass after <domain> <desturi>
    virsh_migrate_extra = ""
    # SSH connection time out
    ssh_timeout = 60
    # Local URI
    virsh_migrate_connect_uri = "qemu:///system"
    image_convert = "no"
    status_error = "no"
    migrate_desturi_port = "16509"
    migrate_desturi_type = "tcp"
    virsh_migrate_desturi = "qemu+tcp://${migrate_dest_host}/system"
    start_vm = "no"
    virsh_migrate_options = "--live --p2p --verbose --migrate-disks-detect-zeroes sdb"
    storage_type = "nfs"
    setup_local_nfs = "yes"
    disk_type = "file"
    disk_source_protocol = "netfs"
    mnt_path_name = ${nfs_mount_dir}
    disk1_name = "retain_sparsity_test_disk1.img"
    disk2_name = "retain_sparsity_test_disk2.img"
    disk_size = "1G"
    mon_host = ""
    check_disk_after_mig = "yes"
    check_disk_kname_after_mig = "sdb"
    libvirtd_file_type = "virtqemud"
    libvirtd_debug_level = "1"
    libvirtd_debug_filters = "1:*"
    libvirtd_debug_file = "/var/log/libvirt/virtqemud.log"
    check_str_local_log = '"discard":"unmap","detect-zeroes":"unmap"'
    variants:
        - copy_storage_all:
            copy_storage_option = "--copy-storage-all"
        - copy_storage_inc:
            copy_storage_option = "--copy-storage-inc"
    variants:
        - src1_rbd:
            src_disk1_backend = "rbd"
            src_disk1_dict = {"device": "disk", "type_name": "block", "driver": {"name": "qemu", "type": "raw"}, "target": {"dev": "sdb", "bus": "scsi"}}
        - src1_raw:
            src_disk1_backend = "raw"
            src_disk1_dict = {"device": "disk", "type_name": "file", "driver": {"name": "qemu", "type": "${src_disk1_backend}"}, "target": {"dev": "sdb", "bus": "scsi"}}
        - src1_qcow2:
            src_disk1_backend = "qcow2"
            src_disk1_dict = {"device": "disk", "type_name": "file", "driver": {"name": "qemu", "type": "${src_disk1_backend}"}, "target": {"dev": "sdb", "bus": "scsi"}}
    variants:
        - dest1_rbd:
            dest_disk1_backend = "rbd"
            dest_disk1_dict = {"device": "disk", "type_name": "block", "driver": {"name": "qemu", "type": "raw"}, "target": {"dev": "sdb", "bus": "scsi"}}
        - dest1_raw:
            dest_disk1_backend = "raw"
            dest_disk1_dict = {"device": "disk", "type_name": "file", "driver": {"name": "qemu", "type": "${src_disk1_backend}"}, "target": {"dev": "sdb", "bus": "scsi"}}
        - dest1_qcow2:
            dest_disk1_backend = "qcow2"
            dest_disk1_dict = {"device": "disk", "type_name": "file", "driver": {"name": "qemu", "type": "${src_disk1_backend}"}, "target": {"dev": "sdb", "bus": "scsi"}}
    variants:
        - disk_num_1:
        - disk_num_2:
            variants:
                - src2_raw:
                    src_disk2_backend = "raw"
                - src2_qcow2:
                    src_disk2_backend = "qcow2"
            variants:
                - dest2_raw:
                    dest_disk2_backend = "raw"
                - dest2_qcow2:
                    dest_disk2_backend = "qcow2"
            src_disk2_dict = {"device": "disk", "type_name": "file", "driver": {"name": "qemu", "type": "${src_disk2_backend}"}, "target": {"dev": "sdc", "bus": "scsi"}}
            dest_disk2_dict = {"device": "disk", "type_name": "file", "driver": {"name": "qemu", "type": "${dest_disk2_backend}"}, "target": {"dev": "sdc", "bus": "scsi"}}
