- migration_with_copy_storage.migration_retain_sparsity:
    type = migration_retain_sparsity
    migration_setup = 'yes'
    # Console output can only be monitored via virsh console output
    only_pty = True
    take_regular_screendumps = no
    # Extra options to pass after <domain> <desturi>
    virsh_migrate_extra = ""
    # SSH connection time out
    ssh_timeout = 60
    # Local URI
    virsh_migrate_connect_uri = "qemu:///system"
    image_convert = "no"
    status_error = "no"
    migrate_desturi_port = "16509"
    migrate_desturi_type = "tcp"
    virsh_migrate_desturi = "qemu+tcp://${migrate_dest_host}/system"
    start_vm = "no"
    setup_nfs = "no"
    nfs_mount_dir =
    setup_local_nfs = "no"
    server_ip = "${migrate_dest_host}"
    server_user = "root"
    server_pwd = "${migrate_dest_pwd}"
    client_ip = "${migrate_source_host}"
    client_user = "root"
    client_pwd = "${migrate_source_pwd}"
    disk_type = "file"
    disk_size = "1G"
    disk_path = "/var/lib/avocado/data/avocado-vt/images"
    target_dev = "sda"
    virsh_migrate_options = "--live --p2p --verbose --migrate-disks-detect-zeroes ${target_dev}"
    mon_host = "EXAMPLE_MON_HOST"
    ceph_pool_name = "migration-pool"
    check_disk_after_mig = "yes"
    check_disk_kname_after_mig = "${target_dev}"
    libvirtd_file_type = "virtqemud"
    libvirtd_debug_level = "1"
    libvirtd_debug_filters = "1:*"
    libvirtd_debug_file = "/var/log/libvirt/virtqemud.log"
    check_str_local_log = '['"discard":"unmap","detect-zeroes":"unmap"']'
    variants:
        - copy_storage_all:
            copy_storage_option = "--copy-storage-all"
        - copy_storage_inc:
            copy_storage_option = "--copy-storage-inc"
    variants:
        - src1_rbd:
            src_driver_type_1 = "rbd"
            src_device_type_1 = "block"
            src_disk1_name = "retain_sparsity_test_disk1"
            src_disk1_dict = {"device": "disk", "type_name": "${src_device_type_1}", "driver": {"name": "qemu", "type": "${src_driver_type_1}"}, "target": {"dev": "${target_dev}", "bus": "scsi"}, "source": {"attrs": {"dev": "/dev/rbd0"}}}
        - src1_raw:
            src_driver_type_1 = "raw"
            src_device_type_1 = "file"
            src_disk1_name = "retain_sparsity_test_disk1.img"
            src_disk1_dict = {"device": "disk", "type_name": "${src_device_type_1}", "driver": {"name": "qemu", "type": "${src_driver_type_1}"}, "target": {"dev": "${target_dev}", "bus": "scsi"}, "source": {"attrs": {"file": "${disk_path}/${src_disk1_name}"}}}
        - src1_qcow2:
            src_driver_type_1 = "qcow2"
            src_device_type_1 = "file"
            src_disk1_name = "retain_sparsity_test_disk1.img"
            src_disk1_dict = {"device": "disk", "type_name": "${src_device_type_1}", "driver": {"name": "qemu", "type": "${src_driver_type_1}"}, "target": {"dev": "${target_dev}", "bus": "scsi"}, "source": {"attrs": {"file": "${disk_path}/${src_disk1_name}"}}}
    variants:
        - dest1_rbd:
            dest_driver_type_1 = "rbd"
            dest_device_type_1 = "block"
            dest_disk1_name = "retain_sparsity_test_disk2"
            dest_disk1_dict = {"device": "disk", "type_name": "${dest_device_type_1}", "driver": {"name": "qemu", "type": "${dest_driver_type_1}"}, "target": {"dev": "${target_dev}", "bus": "scsi"}, "source": {"attrs": {"dev": "/dev/rbd0"}}}
        - dest1_raw:
            dest_driver_type_1 = "raw"
            dest_device_type_1 = "file"
            dest_disk1_name = "${src_disk1_name}"
            dest_disk1_dict = {"device": "disk", "type_name": "${dest_device_type_1}", "driver": {"name": "qemu", "type": "${dest_driver_type_1}"}, "target": {"dev": "${target_dev}", "bus": "scsi"}, "source": {"attrs": {"file": "${disk_path}/${dest_disk1_name}"}}}
        - dest1_qcow2:
            dest_driver_type_1 = "qcow2"
            dest_device_type_1 = "file"
            dest_disk1_name = "${src_disk1_name}"
            dest_disk1_dict = {"device": "disk", "type_name": "${dest_device_type_1}", "driver": {"name": "qemu", "type": "${dest_driver_type_1}"}, "target": {"dev": "${target_dev}", "bus": "scsi"}, "source": {"attrs": {"file": "${disk_path}/${dest_disk1_name}"}}}
    variants:
        - disk_num_1:
        - disk_num_2:
            disk2_name = "retain_sparsity_test_disk2.img"
            dest_device_type_2 = "file"
            variants:
                - src2_raw:
                    src_driver_type_2 = "raw"
                - src2_qcow2:
                    src_driver_type_2 = "qcow2"
            variants:
                - dest2_raw:
                    dest_driver_type_2 = "raw"
                - dest2_qcow2:
                    dest_driver_type_2 = "qcow2"
            src_disk2_dict = {"device": "disk", "type_name": "file", "driver": {"name": "qemu", "type": "${src_driver_type_2}"}, "target": {"dev": "sdb", "bus": "scsi"}, "source": {"attrs": {"file": "${disk_path}/${disk2_name}"}}}
            dest_disk2_dict = {"device": "disk", "type_name": "file", "driver": {"name": "qemu", "type": "${dest_driver_type_2}"}, "target": {"dev": "sdb", "bus": "scsi"}, "source": {"attrs": {"file": "${disk_path}/${disk2_name}"}}}
