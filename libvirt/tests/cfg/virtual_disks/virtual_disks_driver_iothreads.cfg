- virtual_disks.driver.iothreads:
    type = virtual_disks_driver_iothreads
    status_error = "no"
    start_vm = "no"
    func_supported_since_libvirt_ver = (10, 0, 0)
    check_vm_dumpxml = yes
    target_dev = "vda"
    vm_attrs = {'iothreads': 4}
    variants scenario:
        - define_start:
            variants:
                - user_defined:
                    queue_num = "3"
                    driver = {'name': 'qemu', 'queues': '${queue_num}'}
                    driver_iothreads = {'iothread': [{'queue': [{'id': '0'}, {'id': '1'}], 'id': '1'}, {'queue': [{'id': '2'}], 'id': '2'}]}
                    check_qemu_pattern = '"driver":"virtio-blk-pci","num-queues":3,"iothread-vq-mapping":\[{"iothread":"iothread1","vqs":\[0,1\]},{"iothread":"iothread2","vqs":\[2\]}\]'

                - round_robin:
                    driver = {'name': 'qemu', 'type': 'qcow2'}
                    driver_iothreads = {'iothread': [{'id': '1'}, {'id': '2'}, {'id': '3'}]}
                    check_qemu_pattern = '"driver":"virtio-blk-pci","iothread-vq-mapping":\[{"iothread":"iothread1"},{"iothread":"iothread2"},{"iothread":"iothread3"}\]'
        - define_invalid:
            status_error = yes
            variants:
                - both_attribute_subelement:
                    queue_num = "3"
                    driver = {'name': 'qemu', 'queues': '${queue_num}', 'iothread': '4'}
                    driver_iothreads = {'iothread': [{'id': '1'}, {'id': '2'}]}
                    err_msg = "disk driver 'iothread' attribute can't be used together with 'iothreads' subelement"
                - part_iothreads_mapped:
                    queue_num = "3"
                    driver = {'name': 'qemu', 'queues': '${queue_num}'}
                    driver_iothreads = {'iothread': [{'queue': [{'id': '0'}, {'id': '1'}], 'id': '1'}, {'id': '2'}]}
                    err_msg = "unsupported configuration: iothread to queue mapping must be provided for all iothreads or for none"
                - no_iothreads_define:
                    vm_attrs = {'iothreads': 0}
                    queue_num = "2"
                    driver = {'name': 'qemu', 'queues': '${queue_num}'}
                    driver_iothreads = {'iothread': [{'id': '1'}, {'id': '2'}]}
                    err_msg = "unsupported configuration: Disk iothread '1' not defined in iothreadid"
                - dup_mapping_same_iothread:
                    queue_num = "3"
                    driver = {'name': 'qemu', 'queues': '${queue_num}'}
                    driver_iothreads = {'iothread': [{'id': '1'}, {'id': '1'}]}
                    err_msg = "unsupported configuration: Duplicate mapping for iothread '1'"
                - dup_queue_assigned:
                    queue_num = "2"
                    driver = {'name': 'qemu', 'queues': '${queue_num}'}
                    driver_iothreads = {'iothread': [{'queue': [{'id': '0'}], 'id': '1'}, {'queue': [{'id': '1'}], 'id': '2'}, {'queue': [{'id': '1'}], 'id': '3'}]}
                    err_msg = "unsupported configuration: disk iothread queue '1' is already assigned"
                - no_queue_number:
                    driver = {'name': 'qemu', 'type': 'qcow2'}
                    driver_iothreads = {'iothread': [{'queue': [{'id': '0'}], 'id': '1'}, {'queue': [{'id': '2'}], 'id': '2'}]}
                    err_msg = "unsupported configuration: disk 'queue' count must be configured for explicit iothread to queue mapping"
                - missing_iothread_mapping:
                    queue_num = "3"
                    driver = {'name': 'qemu', 'queues': '${queue_num}'}
                    driver_iothreads = {'iothread': [{'queue': [{'id': '2'}], 'id': '1'}, {'queue': [{'id': '1'}], 'id': '2'}]}
                    err_msg = "unsupported configuration: missing iothread mapping for queue '0'"
                - queue_id_out_of_range:
                    queue_num = "2"
                    driver = {'name': 'qemu', 'queues': '${queue_num}'}
                    driver_iothreads = {'iothread': [{'queue': [{'id': '0'}], 'id': '1'}, {'queue': [{'id': '1'}], 'id': '2'}, {'queue': [{'id': '2'}], 'id': '3'}]}
                    err_msg = "unsupported configuration: disk iothread queue '${queue_num}'.*out of range"
        - hotplug_unplug:
            variants:
                - round_robin:
                    new_target_dev = "vdb"
                    new_driver_iothreads = {'iothread': [{'id': '1'}, {'id': '2'}, {'id': '3'}]}
                    new_image_name = "hotplug_disk.qcow2"
                    new_target = {'dev': '${new_target_dev}', 'bus': 'virtio'}
                    new_source = {'attrs': {'file': '%s'}}
                    new_disk_dict = {'target': ${new_target}, 'device': 'disk', 'driver': {'name': 'qemu', 'type': 'qcow2'}, 'driver_iothreads': ${new_driver_iothreads}, 'source': ${new_source}}
                    check_libvirtd_log = '"driver":"virtio-blk-pci","iothread-vq-mapping":\[{"iothread":"iothread1"},{"iothread":"iothread2"},{"iothread":"iothread3"}\]'
                    log_level = "1"
        - update_disk:
            variants:
                - round_robin:
                    status_error = yes
                    driver = {'name': 'qemu', 'type': 'qcow2'}
                    driver_iothreads = {'iothread': [{'id': '1'}, {'id': '2'}, {'id': '3'}]}
                    new_driver_iothreads = {'iothread': [{'id': '1'}, {'id': '2'}]}
        - delete_iothread:
            variants:
                - round_robin:
                    status_error = yes
                    driver = {'name': 'qemu', 'type': 'qcow2'}
                    driver_iothreads = {'iothread': [{'id': '1'}, {'id': '2'}, {'id': '3'}]}
                    del_iothread_id = 2
                    err_msg = "invalid argument: cannot remove IOThread ${del_iothread_id} since it is being used by disk"
    variants disk_bus:
        - virtio:
            target = {'dev': '${target_dev}', 'bus': 'virtio'}
    disk_dict = {'target': ${target}, 'device': 'disk', 'driver': ${driver}, 'driver_iothreads': ${driver_iothreads}}
