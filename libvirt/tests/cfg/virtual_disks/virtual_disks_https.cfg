- virtual_disks.https:
    type = virtual_disks_https
    start_vm = "no"
    target_disk = "sdb"
    disk_type = "raw"
    source_host_name = "insect.mm.fcix.net"
    source_iso_name = "/fedora/linux/releases/41/Server/x86_64/iso/Fedora-Server-netinst-x86_64-41-1.4.iso"
    source_host_port = "443"
    cookie_name = "vmware_soap_session"
    cookie_value = "314455dbd2eaafd7d76b3b7828f0a3e3956450f9"
    expected_xpaths = [{'element_attrs': [".//ssl[@verify='yes']"]}, {'element_attrs': [".//readahead[@size='1024']"]}, {'element_attrs': [".//timeout[@seconds='60']"]}]
    cookie_in_dumpxml = "${cookie_name}.*${cookie_value}"
    func_supported_since_libvirt_ver = (10, 10, 0)
    variants:
        - start_vm:
        - detach_attach_disk:
            with_hotplug = "yes"
    variants:
        - network_disk:
            network_device = "disk"
        - network_cdrom:
            network_device = "cdrom"
    disk_dict = {'type_name': 'network', 'readonly': True, 'device': '${network_device}', 'driver': {'name': 'qemu', 'type': '${disk_type}'}, 'source': {'cookies': {'cookie_name': '${cookie_name}', 'cookie': '${cookie_value}'}, 'readahead': '1024', 'hosts': [{'name': '${source_host_name}', 'port': '${source_host_port}'}], 'timeout': '60', 'ssl': 'yes', 'attrs': {'protocol': 'https', 'name': '${source_iso_name}'}}, 'target': {'dev': '${target_disk}', 'bus': 'scsi'}}
