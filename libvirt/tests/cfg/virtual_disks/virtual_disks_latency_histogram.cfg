- virtual_disks.latency_histogram:
    type = virtual_disks_latency_histogram
    start_vm = "no"
    disk_type = "file"
    disk_target = "vdb"
    disk_bus = "virtio"
    disk_format = "qcow2"
    bin_list = [{'start': '0'}, {'start': '1000'}, {'start': '100000'}]
    func_supported_since_libvirt_ver = (11, 10, 0)
    driver = {"name": "qemu", "type": "${disk_format}"}
    variants test_scenario:
        - start_guest:
            variants:
                - no_type:
                    driver_statistics = {"latency_histogram": [{"bin": ${bin_list}}]}
                    expected_histogram_types = "read,write,flush,zone_append"
                - type_read:
                    driver_statistics = {"latency_histogram": [{"type": "read", "bin": ${bin_list}}]}
                    expected_histogram_types = "read"
                - type_write:
                    driver_statistics = {"latency_histogram": [{"type": "write", "bin": ${bin_list}}]}
                    expected_histogram_types = "write"
                - type_flush:
                    driver_statistics = {"latency_histogram": [{"type": "flush", "bin": ${bin_list}}]}
                    expected_histogram_types = "flush"
                - type_read_zone:
                    driver_statistics = {"latency_histogram": [{"type": "read", "bin": ${bin_list}}, {"type": "zone", "bin": ${bin_list}}]}
                    expected_histogram_types = "read,zone_append"
        - hotplug_unplug:
            variants:
                - read_write:
                    driver_statistics = {"latency_histogram": [{"type": "read", "bin": ${bin_list}}, {"type": "write", "bin": ${bin_list}}]}
                    expected_histogram_types = "read,write"
                - flush_zone:
                    driver_statistics = {"latency_histogram": [{"type": "flush", "bin": ${bin_list}}, {"type": "zone", "bin": ${bin_list}}]}
                    expected_histogram_types = "flush,zone_append"
        - update_disk:
            variants:
                - zone_flush_to_read_write:
                    driver_statistics = {"latency_histogram": [{"type": "zone", "bin": ${bin_list}}, {"type": "flush", "bin": ${bin_list}}]}
                    updated_bin_list = [{'start': '0'}, {'start': '2000'}, {'start': '200000'}]
                    driver_statistics_updated = {"latency_histogram": [{"type": "read", "bin": ${updated_bin_list}}, {"type": "write", "bin": ${updated_bin_list}}]}
                    expected_histogram_types_initial = "zone_append,flush"
                    expected_histogram_types_updated = "read,write"
    disk_dict = {"type_name": "file", "device": "disk", "target": {"dev": "${disk_target}", "bus": "${disk_bus}"}, "driver": ${driver}, "driver_statistics": ${driver_statistics}}
