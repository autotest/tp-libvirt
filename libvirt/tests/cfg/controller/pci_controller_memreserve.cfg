- pci_controller_memreserve:
    type = pci_controller_memreserve
    start_vm = no
    func_supported_since_libvirt_ver = (10, 3, 0)
    # Two vms are required for the tests, one for ovmf and the other for seabios
    vms = "avocado-vt-vm1 vm2"
    only q35,aarch64
    variants:
        - 8M:
            new_memReserve = 8192
        - 10M:
            new_memReserve = 10240
            ovmf:
                expect_memReserve = 16384
        - 16M:
            new_memReserve = 16384
        - 32M:
            new_memReserve = 32768
    variants:
        - firmware:
            variants:
                - ovmf:
                    firmware_type = "ovmf"
                    loader_path = "/usr/share/edk2/ovmf/OVMF_CODE.secboot.fd"
                    smm_state = "on"
                    os_secure = "yes"
                    aarch64:
                        loader_path = "/usr/share/edk2/aarch64/QEMU_EFI-silent-pflash.qcow2"
                        smm_state =
                        os_secure = "no"
                    loader_dict = {'secure': '${os_secure}', 'loader_readonly': 'yes', 'loader_type': 'pflash', 'loader': '${loader_path}'}
                - seabios:
                    only q35
                    firmware_type = "seabios"
    variants:
        - controller:
            variants:
                - pci_bridge:
                    only q35
                    contr_model = "pci-bridge"
                    depend_contr_dict = {"type": "pci", "model": "pcie-to-pci-bridge", "index": "%s"}
                    contr_pattern = ".*PCI-PCI bridge"
                - pcie_root_port:
                    contr_model = "pcie-root-port"
                    contr_pattern = "%s.*PCIe Root port"
    contr_dict = {"type": "pci", "model": "${contr_model}", "index": "%s", "target": {"memReserve":"${new_memReserve}"}}
