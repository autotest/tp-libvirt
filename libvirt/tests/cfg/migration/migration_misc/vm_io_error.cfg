- migration.migration_misc.vm_io_error:
    type = vm_io_error
    migration_setup = 'yes'
    storage_type = 'nfs'
    setup_local_nfs = 'yes'
    disk_type = "file"
    disk_source_protocol = "netfs"
    mnt_path_name = ${nfs_mount_dir}
    # Console output can only be monitored via virsh console output
    only_pty = True
    take_regular_screendumps = no
    # Extra options to pass after <domain> <desturi>
    virsh_migrate_extra = ''
    # SSH connection time out
    ssh_timeout = 60
    # Local URI
    virsh_migrate_connect_uri = 'qemu:///system'
    image_convert = 'no'
    server_ip = "${migrate_dest_host}"
    server_user = "root"
    server_pwd = "${migrate_dest_pwd}"
    client_ip = "${migrate_source_host}"
    client_user = "root"
    client_pwd = "${migrate_source_pwd}"
    status_error = "no"
    migrate_desturi_port = "16509"
    migrate_desturi_type = "tcp"
    virsh_migrate_desturi = "qemu+tcp://${migrate_dest_host}/system"
    start_vm = "no"
    loop_disk = "/var/tmp/vm_io_error_loop_disk.img"
    loop_export_dir = "/var/tmp/vm_io_error_loop_export"
    loop_mnt_dir = "/var/tmp/vm_io_error_loop_mnt"
    second_disk = "${loop_mnt_dir}/vm_io_error_second_disk.qcow2"
    variants:
        - p2p:
            virsh_migrate_options = '--live --p2p --verbose'
        - non_p2p:
            virsh_migrate_options = '--live --verbose'
    variants:
        - with_percopy:
    variants:
        - no_space:
    variants:
        - error_policy_stop_and_cache_mode_none:
            error_policy = "stop"
            cache_mode = "none"
            variants:
                - with_abort_on_error:
                    virsh_migrate_extra = "--abort-on-error"
                    status_error = "yes"
                    err_msg = "job 'migration out' failed due to I/O error"
                - without_abort_on_error:
        - error_policy_stop_and_cache_mode_writeback:
            error_policy = "stop"
            cache_mode = "writeback"
            variants:
                - with_abort_on_error:
                    virsh_migrate_extra = "--abort-on-error"
                - without_abort_on_error:
                    status_error = "yes"
                    err_msg = "job 'migration out' unexpectedly failed"
        - error_policy_report_and_cache_mode_none:
            error_policy = "report"
            cache_mode = "none"
            variants:
                - with_abort_on_error:
                    virsh_migrate_extra = "--abort-on-error"
                - without_abort_on_error:
        - error_policy_report_and_cache_mode_writeback:
            error_policy = "report"
            cache_mode = "writeback"
            variants:
                - with_abort_on_error:
                    virsh_migrate_extra = "--abort-on-error"
                - without_abort_on_error:
    disk_dict = {"type_name": "file", "driver": {"name": "qemu", "type": "qcow2", "cache": "${cache_mode}", "error_policy": "${error_policy}"}, "device": "disk", "target": {"dev": "vdb", "bus": "virtio"}, "source": {"attrs": {"file": "${second_disk}"}}}
