- migration.migration_with_disk.migration_with_fdgroup:
    type = migration_with_fdgroup
    start_vm = "no"
    migration_setup = "yes"
    storage_type = "nfs"
    setup_local_nfs = "yes"
    disk_type = "file"
    disk_source_protocol = "netfs"
    mnt_path_name = ${nfs_mount_dir}
    # Console output can only be monitored via virsh console output
    only_pty = True
    take_regular_screendumps = no
    # Extra options to pass after <domain> <desturi>
    virsh_migrate_extra = ""
    # SSH connection time out
    ssh_timeout = 60
    virsh_migrate_connect_uri = "qemu:///system"
    virsh_migrate_dest_state = "running"
    virsh_migrate_src_state = "shut off"
    server_ip = "${migrate_dest_host}"
    server_user = "root"
    server_pwd = "${migrate_dest_pwd}"
    client_ip = "${migrate_source_host}"
    client_pwd = "${migrate_source_pwd}"
    migrate_desturi_port = "22"
    migrate_desturi_type = "ssh"
    virsh_migrate_desturi = "qemu+ssh://${migrate_dest_host}/system"
    # File descriptor settings
    func_supported_since_libvirt_ver = (9, 0, 0)
    pkgs_host = "lsof"
    fdgroup_name_vdb = "fdgroup1"
    fdgroup_name_vdc = "fdgroup2"
    file_descriptor_id_vdb = "4"
    file_descriptor_id_vdc = "5"
    source_file_path_vdb = "${nfs_mount_dir}/fd_test_vdb"
    source_file_path_vdc = "${nfs_mount_dir}/fd_test_vdc"
    target_format_vdb = "qcow2"
    target_format_vdc = "raw"
    disk_dict_vdb = {"type_name": "file", "device": "disk", "driver": {"name": "qemu", "type": "${target_format_vdb}"}, "source": {"attrs": {"file": "${source_file_path_vdb}", "fdgroup": "${fdgroup_name_vdb}"}}, "target": {"dev": "vdb", "bus": "virtio"}}
    disk_dict_vdc = {"type_name": "file", "device": "disk", "driver": {"name": "qemu", "type": "${target_format_vdc}"}, "source": {"attrs": {"file": "${source_file_path_vdc}", "fdgroup": "${fdgroup_name_vdc}"}}, "target": {"dev": "vdc", "bus": "virtio"}}
    no ppc64le
    variants:
        - flag_none:
            flag = ""
        - flag_seclabel_restore:
            flag = " --seclabel-restore"
        - flag_seclabel_writable:
            flag = " --seclabel-writable"
        - flag_seclabel_restore_writable:
            flag = " --seclabel-restore --seclabel-writable"
