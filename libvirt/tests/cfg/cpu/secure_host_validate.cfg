- cpu.secure_launch.secure_host_validate:
    type = secure_host_validate
    start_vm = "no"
    only x86_64
    kernel_msg_cmd = "journalctl -b 0 -k"
    variants:
        - amd_secure:
            cpu_vendor = "amd"
            variants:
                - sev_series:
                    kvm_probe_module_force_load = yes
                    req_kernel_opts = ["mem_encrypt=on", "amd_iommu=on"]
                    validate_cmds = {"sevctl": {"package": "sevctl", "cmd_params": "ok"}, "virt-host-validate": {"package": "libvirt", "cmd_params": ""}}
                    virt_host_validate_patterns = ['QEMU: Checking for secure guest support\s+:\s+PASS\n\s*\(SEV']
                    sevctl_sev_pattern = '\[.*PASS.*\]\s+-\s+Secure\sEncrypted\sVirtualization\s+\(SEV\)'
                    sevctl_sev_es_pattern = '\[.*PASS.*\]\s+-\s+Encrypted\sState\s+\(SEV-ES\)'
                    sevctl_sev_snp_pattern = '\[.*PASS.*\]\s+-\s+Secure Nested Paging\s+\(SEV-SNP\)'
                    variants:
                        - sev:
                            secure_feature = "sev"
                            cpu_flags = ["sev"]
                            kvm_probe_module_parameters = "sev=1"
                            sevctl_patterns = ['${sevctl_sev_pattern}']
                        - sev_es:
                            secure_feature = "sev-es"
                            cpu_flags = ["sev", "sev_es"]
                            kvm_probe_module_parameters = "sev=1 sev-es=1"
                            sevctl_patterns = ['${sevctl_sev_pattern}', '${sevctl_sev_es_pattern}']
                        - sev_snp:
                            secure_feature = "sev-snp"
                            cpu_flags = ["sev", "sev_es", "sev_snp"]
                            kvm_probe_module_parameters = "sev=1 sev-es=1 sev-snp=1"
                            sevctl_patterns = ['${sevctl_sev_pattern}', '${sevctl_sev_es_pattern}', '${sevctl_sev_snp_pattern}']
                            virt_host_validate_patterns = ['QEMU: Checking for secure guest support\s+:\s+PASS\n\s*\(SEV-SNP\)']
        - inter_secure:
            cpu_vendor = "intel"
            variants:
                - sgx:
                    func_supported_since_libvirt_ver = (9, 0, 0)
                    secure_feature = "sgx"
                    cpu_flags = ["sgx", "sgx_lc"]
                    kernel_msg_patterns = ["EPC section"]
                    domcap_xpath = [{'element_attrs':[".//features/sgx[@supported='yes']"]}, {'element_attrs':[".//features/sgx/flc"],'text':'yes'}, {'element_attrs':[".//features/sgx/sgx1"],'text':'yes'}, {'element_attrs':[".//features/sgx/sgx2"],'text':'yes'}, {'element_attrs':[".//features/sgx/sections"]}]
                - tdx:
                    func_supported_since_libvirt_ver = (11, 10, 0)
                    secure_feature = "tdx"
                    cpu_flags = ["tdx_host_platform"]
                    kvm_probe_module_force_load = yes
                    kvm_probe_module_parameters = "tdx=1"
                    kvm_probe_module_ignored_parameters = vmentry_l1d_flush=not required
                    req_kernel_opts = ["nohibernate", "intel_iommu=on"]
                    domcap_xpath = [{'element_attrs':[".//features/launchSecurity[@supported='yes']"]}, {'element_attrs':[".//features/launchSecurity/enum[@name='sectype']"]},  {'element_attrs':[".//features/launchSecurity/enum/value"],'text':'tdx'}]
                    validate_cmds = {"virt-host-validate": {"package": "libvirt", "cmd_params": ""}}
                    virt_host_validate_patterns = ['QEMU: Checking for secure guest support\s+:\s+PASS\n\s*\(TDX\)']

